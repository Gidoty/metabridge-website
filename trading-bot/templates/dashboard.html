<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d1421">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<link rel="icon" href="/static/icon-192.png">
<title>Trading Bot Dashboard</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: max(16px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom));
    background: #0d1421;
    color: #e7edf5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  h1 { font-size: 1.1rem; font-weight: 600; margin: 0 0 4px; }
  .sub { color: #7d8aa0; font-size: 0.8rem; margin-bottom: 16px; }
  .card {
    background: #161f30;
    border: 1px solid #232f45;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .badge-gray { background: #2a3550; color: #a9b6cc; }
  .badge-blue { background: #123a55; color: #6ec1f0; }
  .badge-red { background: #4a1620; color: #ff8a94; }
  .row { display: flex; justify-content: space-between; align-items: baseline; margin: 6px 0; }
  .label { color: #7d8aa0; font-size: 0.82rem; }
  .value { font-weight: 600; font-size: 0.95rem; }
  .value.pos { color: #38bd89; }
  .value.neg { color: #ff6b7a; }
  .big { font-size: 1.6rem; font-weight: 700; margin: 4px 0 2px; }
  .empty { color: #7d8aa0; font-size: 0.88rem; padding: 4px 0; }
  .halt-banner {
    background: #4a1620;
    border: 1px solid #6b1f2c;
    color: #ff8a94;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 0.85rem;
    margin-bottom: 12px;
  }
  .log {
    background: #0a0f1a;
    border-radius: 10px;
    padding: 10px 12px;
    font-family: "SF Mono", "JetBrains Mono", ui-monospace, monospace;
    font-size: 0.72rem;
    line-height: 1.5;
    max-height: 240px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
    color: #9db0c9;
  }
  .updated { color: #4a5468; font-size: 0.72rem; text-align: center; margin-top: 8px; }
</style>
</head>
<body>
<h1>Trading Bot</h1>
<div class="sub">Read-only monitor - refreshes automatically</div>
<div id="app"></div>

<script>
const initialStatus = {{ status | tojson }};

function fmt(v, decimals) {
  if (v === null || v === undefined) return "-";
  return Number(v).toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function modeBadgeClass(mode) {
  if (!mode) return "badge-gray";
  if (mode.startsWith("LIVE")) return "badge-red";
  if (mode.startsWith("TESTNET")) return "badge-blue";
  return "badge-gray";
}

function render(s) {
  const pos = s.position;
  let posHtml;
  if (pos) {
    const pnlClass = pos.unrealized_pnl >= 0 ? "pos" : "neg";
    posHtml = `
      <div class="row"><span class="label">Direction</span><span class="value">${pos.direction.toUpperCase()}</span></div>
      <div class="row"><span class="label">Entry</span><span class="value">${fmt(pos.entry, 2)}</span></div>
      <div class="row"><span class="label">Stop-loss</span><span class="value">${fmt(pos.stop, 2)}</span></div>
      <div class="row"><span class="label">Take-profit</span><span class="value">${fmt(pos.target, 2)}</span></div>
      <div class="row"><span class="label">Quantity</span><span class="value">${fmt(pos.qty, 6)}</span></div>
      <div class="row"><span class="label">Unrealized PnL</span><span class="value ${pnlClass}">${fmt(pos.unrealized_pnl, 2)}</span></div>
    `;
  } else {
    posHtml = `<div class="empty">No open position</div>`;
  }

  const dailyPnl = s.daily_realized_pnl;
  const dailyClass = dailyPnl >= 0 ? "pos" : "neg";

  const halted = s.halted
    ? `<div class="halt-banner">&#9888; Trading halted: ${s.halt_reason || "unknown reason"}</div>`
    : "";

  const logHtml = (s.log_lines && s.log_lines.length)
    ? s.log_lines.map(l => l.replace(/&/g, "&amp;").replace(/</g, "&lt;")).join("\n")
    : "(no log entries yet)";

  document.getElementById("app").innerHTML = `
    ${halted}
    <div class="card">
      <span class="badge ${modeBadgeClass(s.mode)}">${s.mode || "unknown"}</span>
      <div class="big">${fmt(s.equity, 2)} <span style="font-size:0.9rem;color:#7d8aa0;">USDT</span></div>
      <div class="row"><span class="label">Symbol</span><span class="value">${s.symbol || "-"} (${s.timeframe || "-"})</span></div>
      <div class="row"><span class="label">Last price</span><span class="value">${fmt(s.last_price, 2)}</span></div>
    </div>

    <div class="card">
      <div class="row"><span class="label" style="font-weight:600;color:#e7edf5;">Position</span></div>
      ${posHtml}
    </div>

    <div class="card">
      <div class="row"><span class="label" style="font-weight:600;color:#e7edf5;">Risk status</span></div>
      <div class="row"><span class="label">Today's realized PnL</span><span class="value ${dailyClass}">${fmt(dailyPnl, 2)}</span></div>
      <div class="row"><span class="label">Consecutive losses</span><span class="value">${s.consecutive_losses ?? "-"}</span></div>
    </div>

    <div class="card">
      <div class="row"><span class="label" style="font-weight:600;color:#e7edf5;">Recent log</span></div>
      <div class="log">${logHtml}</div>
    </div>

    <div class="updated">Updated ${s.updated_at ? new Date(s.updated_at).toLocaleString() : "-"}</div>
  `;
}

render(initialStatus);

setInterval(() => {
  fetch("/api/status")
    .then(r => r.json())
    .then(render)
    .catch(() => {});
}, 10000);
</script>
</body>
</html>
